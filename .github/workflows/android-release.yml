name: Android CI Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-build-release:
    runs-on: ubuntu-latest
    environment: KEYSTORE
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      SIGNING_KEY_B64: ${{ secrets.SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing key
        run: |
          echo "$SIGNING_KEY_B64" | base64 --decode > key.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/key.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE=$GITHUB_WORKSPACE/key.jks" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-build-${{ github.run_attempt }}
          name: Release Build ${{ github.run_number }}.${{ github.run_attempt }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
